repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  # Ruff
  - repo: local
    hooks:
      # Formatter
      - id: ruff-format
        entry: uv run ruff format
        name: ruff-format (fix)
        language: system
        types: [python]
        stages: [pre-commit]
        pass_filenames: false

      # Linter
      - id: ruff-check
        entry: uv run ruff check
        name: ruff-check (lint)
        language: system
        types: [python]
        stages: [manual]
        pass_filenames: false

      - id: ruff-check
        entry: uv run ruff check --fix-only
        name: ruff-check (fix)
        language: system
        types: [python]
        stages: [pre-commit]
        pass_filenames: false

  # Pylint
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: uv run pylint .
        language: system
        types: [python]
        stages: [manual]
        pass_filenames: false

  # Mypy
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        stages: [manual]
        pass_filenames: false

  # Codespell
  - repo: local
    hooks:
      - id: codespell
        name: codespell
        entry: uv run codespell
        language: system
        stages: [manual]
        pass_filenames: false

  # Bandit
  - repo: local
    hooks:
      - id: bandit
        name: bandit
        entry: uv run bandit -c pyproject.toml -r .
        language: system
        stages: [manual]
        pass_filenames: false

  # Detect Secrets
  - repo: local
    hooks:
      - id: detect-secrets
        name: detect-secrets
        entry: uv run detect-secrets
        language: system
        stages: [pre-commit, manual]
        pass_filenames: false

  # Makefile Checks
  - repo: https://github.com/checkmake/checkmake.git
    rev: 0.2.2
    hooks:
      - id: checkmake
        stages: [manual]

  # Pip Audit
  - repo: local
    hooks:
      - id: pip-audit
        name: pip-audit
        entry: uv run pip-audit
        language: system
        stages: [manual]
        pass_filenames: false
