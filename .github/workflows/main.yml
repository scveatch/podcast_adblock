name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate cache key
        id: cache-key
        run: echo "key=${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}" >> $GITHUB_OUTPUT

  lint-python:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1

      - name: Cache uv + linters
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .cache/ruff
            .cache/pylint
            .mypy_cache
          key: ${{ needs.setup.outputs.cache-key }}

      - run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pylint
        run: uv run pylint .

      - name: MyPy
        run: uv run mypy .

  lint-sql:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1
      - run: uv sync --frozen
      - run: uv run sqlfluff lint .

  security:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1
      - run: uv sync --frozen

      - name: Bandit
        run: uv run bandit -c pyproject.toml -r .

      - name: pip-audit
        run: uv run pip-audit --ignore-vuln CVE-2026-4539

      - name: License check
        run: uv run pip-licenses --fail-on "GPL;AGPL;LGPL"

  precommit-manual:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1

      - run: uv sync --frozen
      - run: uv run python -m pre_commit install

      - name: Run manual hooks
        run: |
          uv run python -m pre_commit run --hook-stage manual --all-files

  integrity:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
      - run: |
          pip install pre-commit
          pre-commit run check-yaml --all-files
          pre-commit run check-json --all-files
          pre-commit run check-toml --all-files
          pre-commit run check-xml --all-files

  whitespace:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: git diff --check

  spellcheck:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v1
      - run: uv sync --frozen
      - run: uv run codespell .
